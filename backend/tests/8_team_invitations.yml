name: Team invitations
vars:
  base_url: http://127.0.0.1:8080
  token_admin: admin

testcases:
  # BLC: BLC-USER-003
  - name: ti-create-lead-user
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/users"
        headers:
          Authorization: "Bearer {{.token_admin}}"
          Content-Type: application/json
        body: |
          {
            "email": "ti-lead@test.com"
          }
        assertions:
          - result.statuscode ShouldEqual 201
        vars:
          userid:
            from: result.bodyjson.id

  # BLC: BLC-USER-003
  - name: ti-create-lead-session
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/users/{{.ti-create-lead-user.userid}}/sessions"
        headers:
          Authorization: "Bearer {{.token_admin}}"
        assertions:
          - result.statuscode ShouldEqual 201
        vars:
          sessionid:
            from: result.bodyjson.id

  # BLC: BLC-TEAM-008, BLC-TINV-001
  - name: ti-lead-create-shared
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/teams"
        headers:
          Authorization: "Bearer {{.ti-create-lead-session.sessionid}}"
          Content-Type: application/json
        body: |
          {
            "name": "TI Shared Team"
          }
        assertions:
          - result.statuscode ShouldEqual 201
        vars:
          shared_team_id:
            from: result.bodyjson.id

  # BLC: BLC-USER-003
  - name: ti-create-guest-user
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/users"
        headers:
          Authorization: "Bearer {{.token_admin}}"
          Content-Type: application/json
        body: |
          {
            "email": "ti-guest@test.com"
          }
        assertions:
          - result.statuscode ShouldEqual 201
        vars:
          userid:
            from: result.bodyjson.id

  # BLC: BLC-USER-003
  - name: ti-create-guest-session
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/users/{{.ti-create-guest-user.userid}}/sessions"
        headers:
          Authorization: "Bearer {{.token_admin}}"
        assertions:
          - result.statuscode ShouldEqual 201
        vars:
          sessionid:
            from: result.bodyjson.id

  # BLC: BLC-TINV-007, BLC-TINV-002, BLC-TINV-006
  - name: ti-admin-create-invitation
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/teams/{{.ti-lead-create-shared.shared_team_id}}/invitations"
        headers:
          Authorization: "Bearer {{.ti-create-lead-session.sessionid}}"
        assertions:
          - result.statuscode ShouldEqual 201
          - result.bodyjson.team_id ShouldEqual "{{.ti-lead-create-shared.shared_team_id}}"
          - result.body ShouldContainSubstring "-"
        vars:
          invitation_id:
            from: result.bodyjson.id

  # BLC: BLC-TINV-008, BLC-TINV-002
  - name: ti-admin-list-invitations
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/teams/{{.ti-lead-create-shared.shared_team_id}}/invitations"
        headers:
          Authorization: "Bearer {{.ti-create-lead-session.sessionid}}"
        assertions:
          - result.statuscode ShouldEqual 200
          - result.bodyjson ShouldHaveLength 1

  # BLC: BLC-TINV-008, BLC-TINV-002
  - name: ti-admin-get-invitation
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/teams/{{.ti-lead-create-shared.shared_team_id}}/invitations/{{.ti-admin-create-invitation.invitation_id}}"
        headers:
          Authorization: "Bearer {{.ti-create-lead-session.sessionid}}"
        assertions:
          - result.statuscode ShouldEqual 200
          - result.bodyjson.id ShouldEqual "{{.ti-admin-create-invitation.invitation_id}}"

  # BLC: BLC-TINV-010, BLC-TINV-013, BLC-TINV-012
  - name: ti-guest-accept-invitation
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/invitations/{{.ti-admin-create-invitation.invitation_id}}/accept"
        headers:
          Authorization: "Bearer {{.ti-create-guest-session.sessionid}}"
        assertions:
          - result.statuscode ShouldEqual 200
          - result.bodyjson.id ShouldEqual "{{.ti-lead-create-shared.shared_team_id}}"

  # BLC: BLC-TINV-008, BLC-TINV-002
  - name: ti-guest-list-invitations-forbidden
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/teams/{{.ti-lead-create-shared.shared_team_id}}/invitations"
        headers:
          Authorization: "Bearer {{.ti-create-guest-session.sessionid}}"
        assertions:
          - result.statuscode ShouldEqual 403

  # BLC: BLC-TINV-010, BLC-TINV-013, BLC-TINV-012
  - name: ti-guest-accept-idempotent
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/invitations/{{.ti-admin-create-invitation.invitation_id}}/accept"
        headers:
          Authorization: "Bearer {{.ti-create-guest-session.sessionid}}"
        assertions:
          - result.statuscode ShouldEqual 200

  # BLC: BLC-USER-003
  - name: ti-create-maintainer-user
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/users"
        headers:
          Authorization: "Bearer {{.token_admin}}"
          Content-Type: application/json
        body: |
          {
            "email": "ti-maintainer@test.com"
          }
        assertions:
          - result.statuscode ShouldEqual 201
        vars:
          userid:
            from: result.bodyjson.id

  # BLC: BLC-USER-003
  - name: ti-create-maintainer-session
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/users/{{.ti-create-maintainer-user.userid}}/sessions"
        headers:
          Authorization: "Bearer {{.token_admin}}"
        assertions:
          - result.statuscode ShouldEqual 201
        vars:
          sessionid:
            from: result.bodyjson.id

  # BLC: BLC-TEAM-011, BLC-TINV-002
  - name: ti-lead-add-maintainer
    steps:
      - type: http
        method: PUT
        url: "{{.base_url}}/api/v1/teams/{{.ti-lead-create-shared.shared_team_id}}"
        headers:
          Authorization: "Bearer {{.ti-create-lead-session.sessionid}}"
          Content-Type: application/json
        body: |
          {
            "name": "TI Shared Team",
            "members": [
              { "user": { "id": "{{.ti-create-lead-user.userid}}" }, "role": "admin" },
              { "user": { "id": "{{.ti-create-guest-user.userid}}" }, "role": "guest" },
              { "user": { "id": "{{.ti-create-maintainer-user.userid}}" }, "role": "content_maintainer" }
            ]
          }
        assertions:
          - result.statuscode ShouldEqual 200

  # BLC: BLC-TINV-011
  - name: ti-maintainer-accept-no-downgrade
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/invitations/{{.ti-admin-create-invitation.invitation_id}}/accept"
        headers:
          Authorization: "Bearer {{.ti-create-maintainer-session.sessionid}}"
        assertions:
          - result.statuscode ShouldEqual 200

  # BLC: BLC-TINV-011
  - name: ti-maintainer-still-content-maintainer
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/teams/{{.ti-lead-create-shared.shared_team_id}}"
        headers:
          Authorization: "Bearer {{.ti-create-maintainer-session.sessionid}}"
        assertions:
          - result.statuscode ShouldEqual 200
          - result.body ShouldContainSubstring "ti-maintainer@test.com"
          - result.body ShouldContainSubstring "content_maintainer"

  # BLC: BLC-TINV-014, BLC-TINV-004
  - name: ti-accept-unknown-invitation-404
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/invitations/00000000-0000-4000-8000-000000000001/accept"
        headers:
          Authorization: "Bearer {{.ti-create-guest-session.sessionid}}"
        assertions:
          - result.statuscode ShouldEqual 404

  # BLC: BLC-TEAM-001, BLC-TINV-001
  - name: ti-lead-personal-team-id
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/teams"
        headers:
          Authorization: "Bearer {{.ti-create-lead-session.sessionid}}"
        assertions:
          - result.statuscode ShouldEqual 200
          - result.bodyjson.bodyjson0.owner.email ShouldEqual "ti-lead@test.com"
        vars:
          lead_personal_team_id:
            from: result.bodyjson.bodyjson0.id

  # BLC: BLC-TINV-001, BLC-TINV-007
  - name: ti-personal-team-invite-bad-request
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/teams/{{.ti-lead-personal-team-id.lead_personal_team_id}}/invitations"
        headers:
          Authorization: "Bearer {{.ti-create-lead-session.sessionid}}"
        assertions:
          - result.statuscode ShouldEqual 400

  # BLC: BLC-TINV-002
  - name: ti-platform-admin-cannot-invite-without-team-admin
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/teams/{{.ti-lead-create-shared.shared_team_id}}/invitations"
        headers:
          Authorization: "Bearer {{.token_admin}}"
        assertions:
          - result.statuscode ShouldEqual 404

  # BLC: BLC-TINV-009, BLC-TINV-004
  - name: ti-admin-delete-invitation
    steps:
      - type: http
        method: DELETE
        url: "{{.base_url}}/api/v1/teams/{{.ti-lead-create-shared.shared_team_id}}/invitations/{{.ti-admin-create-invitation.invitation_id}}"
        headers:
          Authorization: "Bearer {{.ti-create-lead-session.sessionid}}"
        assertions:
          - result.statuscode ShouldEqual 204

  # BLC: BLC-TINV-014, BLC-TINV-004
  - name: ti-accept-after-delete-404
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/invitations/{{.ti-admin-create-invitation.invitation_id}}/accept"
        headers:
          Authorization: "Bearer {{.ti-create-guest-session.sessionid}}"
        assertions:
          - result.statuscode ShouldEqual 404

  # Teardown: remove team first to avoid dangling member references.
  - name: ti-cleanup-delete-shared-team
    steps:
      - type: http
        method: DELETE
        url: "{{.base_url}}/api/v1/teams/{{.ti-lead-create-shared.shared_team_id}}"
        headers:
          Authorization: "Bearer {{.ti-create-lead-session.sessionid}}"
        assertions:
          - result.statuscode ShouldEqual 200

  # Teardown: keep suites isolated regardless of file execution order.
  - name: ti-cleanup-delete-maintainer-user
    steps:
      - type: http
        method: DELETE
        url: "{{.base_url}}/api/v1/users/{{.ti-create-maintainer-user.userid}}"
        headers:
          Authorization: "Bearer {{.token_admin}}"
        assertions:
          - result.statuscode ShouldEqual 200
          - result.bodyjson.id ShouldEqual "{{.ti-create-maintainer-user.userid}}"

  # Teardown: remove invited guest user and related memberships/sessions.
  - name: ti-cleanup-delete-guest-user
    steps:
      - type: http
        method: DELETE
        url: "{{.base_url}}/api/v1/users/{{.ti-create-guest-user.userid}}"
        headers:
          Authorization: "Bearer {{.token_admin}}"
        assertions:
          - result.statuscode ShouldEqual 200
          - result.bodyjson.id ShouldEqual "{{.ti-create-guest-user.userid}}"

  # Teardown: remove lead user and any remaining invitation suite artifacts.
  - name: ti-cleanup-delete-lead-user
    steps:
      - type: http
        method: DELETE
        url: "{{.base_url}}/api/v1/users/{{.ti-create-lead-user.userid}}"
        headers:
          Authorization: "Bearer {{.token_admin}}"
        assertions:
          - result.statuscode ShouldEqual 200
          - result.bodyjson.id ShouldEqual "{{.ti-create-lead-user.userid}}"
