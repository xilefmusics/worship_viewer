name: Teams endpoints
vars:
  base_url: http://127.0.0.1:8080
  token_admin: admin

testcases:
  - name: team-admin-initial-list
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/teams"
        headers:
          Authorization: "Bearer {{.token_admin}}"
        assertions:
          - result.statuscode ShouldEqual 200
          - result.bodyjson ShouldHaveLength 1
          - result.bodyjson.bodyjson0.name ShouldEqual "Personal"
          - result.bodyjson.bodyjson0.owner.email ShouldEqual "admin@example.com"
          - result.bodyjson.bodyjson0.members ShouldHaveLength 0
        vars:
          admin_personal_team_id:
            from: result.bodyjson.bodyjson0.id

  - name: team-get-public-not-exposed
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/teams/public"
        headers:
          Authorization: "Bearer {{.token_admin}}"
        assertions:
          - result.statuscode ShouldEqual 404

  - name: team-list-excludes-public
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/teams"
        headers:
          Authorization: "Bearer {{.token_admin}}"
        assertions:
          - result.statuscode ShouldEqual 200
          - result.body ShouldNotContainSubstring '"id":"public"'

  - name: team-create-solo-user
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/users"
        headers:
          Authorization: "Bearer {{.token_admin}}"
          Content-Type: application/json
        body: |
          {
            "email": "team-solo@test.com"
          }
        assertions:
          - result.statuscode ShouldEqual 201
        vars:
          userid:
            from: result.bodyjson.id

  - name: team-create-solo-session
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/users/{{.team-create-solo-user.userid}}/sessions"
        headers:
          Authorization: "Bearer {{.token_admin}}"
        assertions:
          - result.statuscode ShouldEqual 201
        vars:
          sessionid:
            from: result.bodyjson.id

  - name: team-solo-sees-personal-only
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/teams"
        headers:
          Authorization: "Bearer {{.team-create-solo-session.sessionid}}"
        assertions:
          - result.statuscode ShouldEqual 200
          - result.bodyjson ShouldHaveLength 1
          - result.bodyjson.bodyjson0.name ShouldEqual "Personal"
          - result.bodyjson.bodyjson0.owner.email ShouldEqual "team-solo@test.com"
          - result.bodyjson.bodyjson0.members ShouldHaveLength 0
        vars:
          solo_personal_team_id:
            from: result.bodyjson.bodyjson0.id

  - name: team-solo-rename-personal
    steps:
      - type: http
        method: PUT
        url: "{{.base_url}}/api/v1/teams/{{.team-solo-sees-personal-only.solo_personal_team_id}}"
        headers:
          Authorization: "Bearer {{.team-create-solo-session.sessionid}}"
          Content-Type: application/json
        body: |
          {
            "name": "Renamed Personal"
          }
        assertions:
          - result.statuscode ShouldEqual 200
          - result.bodyjson.name ShouldEqual "Renamed Personal"

  - name: team-solo-cannot-delete-personal
    steps:
      - type: http
        method: DELETE
        url: "{{.base_url}}/api/v1/teams/{{.team-solo-sees-personal-only.solo_personal_team_id}}"
        headers:
          Authorization: "Bearer {{.team-create-solo-session.sessionid}}"
        assertions:
          - result.statuscode ShouldEqual 403

  - name: team-create-lead-user
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/users"
        headers:
          Authorization: "Bearer {{.token_admin}}"
          Content-Type: application/json
        body: |
          {
            "email": "team-lead@test.com"
          }
        assertions:
          - result.statuscode ShouldEqual 201
        vars:
          userid:
            from: result.bodyjson.id

  - name: team-create-lead-session
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/users/{{.team-create-lead-user.userid}}/sessions"
        headers:
          Authorization: "Bearer {{.token_admin}}"
        assertions:
          - result.statuscode ShouldEqual 201
        vars:
          sessionid:
            from: result.bodyjson.id

  - name: team-lead-create-shared-a
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/teams"
        headers:
          Authorization: "Bearer {{.team-create-lead-session.sessionid}}"
          Content-Type: application/json
        body: |
          {
            "name": "Shared Duplicate Name"
          }
        assertions:
          - result.statuscode ShouldEqual 201
          - result.bodyjson.name ShouldEqual "Shared Duplicate Name"
          - result.bodyjson.members ShouldHaveLength 1
        vars:
          shared_team_a_id:
            from: result.bodyjson.id

  - name: team-lead-create-shared-b-same-name
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/teams"
        headers:
          Authorization: "Bearer {{.team-create-lead-session.sessionid}}"
          Content-Type: application/json
        body: |
          {
            "name": "Shared Duplicate Name"
          }
        assertions:
          - result.statuscode ShouldEqual 201
          - result.bodyjson.name ShouldEqual "Shared Duplicate Name"
        vars:
          shared_team_b_id:
            from: result.bodyjson.id

  - name: team-lead-list-personal-and-shared
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/teams"
        headers:
          Authorization: "Bearer {{.team-create-lead-session.sessionid}}"
        assertions:
          - result.statuscode ShouldEqual 200
          - result.bodyjson ShouldHaveLength 3

  - name: team-platform-admin-lists-all-teams
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/teams"
        headers:
          Authorization: "Bearer {{.token_admin}}"
        assertions:
          - result.statuscode ShouldEqual 200
          - result.bodyjson ShouldHaveLength 5
          - result.body ShouldContainSubstring "{{.team-lead-create-shared-a.shared_team_a_id}}"
          - result.body ShouldContainSubstring "{{.team-lead-create-shared-b-same-name.shared_team_b_id}}"
          - result.body ShouldContainSubstring "{{.team-solo-sees-personal-only.solo_personal_team_id}}"

  - name: team-platform-admin-gets-shared-without-membership
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/teams/{{.team-lead-create-shared-a.shared_team_a_id}}"
        headers:
          Authorization: "Bearer {{.token_admin}}"
        assertions:
          - result.statuscode ShouldEqual 200
          - result.bodyjson.name ShouldEqual "Shared Duplicate Name"

  - name: team-create-guest-user
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/users"
        headers:
          Authorization: "Bearer {{.token_admin}}"
          Content-Type: application/json
        body: |
          {
            "email": "team-guest@test.com"
          }
        assertions:
          - result.statuscode ShouldEqual 201
        vars:
          userid:
            from: result.bodyjson.id

  - name: team-create-guest-session
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/users/{{.team-create-guest-user.userid}}/sessions"
        headers:
          Authorization: "Bearer {{.token_admin}}"
        assertions:
          - result.statuscode ShouldEqual 201
        vars:
          sessionid:
            from: result.bodyjson.id

  - name: team-lead-add-guest
    steps:
      - type: http
        method: PUT
        url: "{{.base_url}}/api/v1/teams/{{.team-lead-create-shared-a.shared_team_a_id}}"
        headers:
          Authorization: "Bearer {{.team-create-lead-session.sessionid}}"
          Content-Type: application/json
        body: |
          {
            "name": "Shared Duplicate Name",
            "members": [
              { "user": { "id": "{{.team-create-lead-user.userid}}" }, "role": "admin" },
              { "user": { "id": "{{.team-create-guest-user.userid}}" }, "role": "guest" }
            ]
          }
        assertions:
          - result.statuscode ShouldEqual 200

  - name: team-guest-can-read-shared
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/teams/{{.team-lead-create-shared-a.shared_team_a_id}}"
        headers:
          Authorization: "Bearer {{.team-create-guest-session.sessionid}}"
        assertions:
          - result.statuscode ShouldEqual 200

  - name: team-guest-cannot-update-shared
    steps:
      - type: http
        method: PUT
        url: "{{.base_url}}/api/v1/teams/{{.team-lead-create-shared-a.shared_team_a_id}}"
        headers:
          Authorization: "Bearer {{.team-create-guest-session.sessionid}}"
          Content-Type: application/json
        body: |
          {
            "name": "Hijack Attempt"
          }
        assertions:
          - result.statuscode ShouldEqual 403

  - name: team-create-maintainer-user
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/users"
        headers:
          Authorization: "Bearer {{.token_admin}}"
          Content-Type: application/json
        body: |
          {
            "email": "team-maintainer@test.com"
          }
        assertions:
          - result.statuscode ShouldEqual 201
        vars:
          userid:
            from: result.bodyjson.id

  - name: team-create-maintainer-session
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/users/{{.team-create-maintainer-user.userid}}/sessions"
        headers:
          Authorization: "Bearer {{.token_admin}}"
        assertions:
          - result.statuscode ShouldEqual 201
        vars:
          sessionid:
            from: result.bodyjson.id

  - name: team-lead-add-content-maintainer
    steps:
      - type: http
        method: PUT
        url: "{{.base_url}}/api/v1/teams/{{.team-lead-create-shared-a.shared_team_a_id}}"
        headers:
          Authorization: "Bearer {{.team-create-lead-session.sessionid}}"
          Content-Type: application/json
        body: |
          {
            "name": "Shared Duplicate Name",
            "members": [
              { "user": { "id": "{{.team-create-lead-user.userid}}" }, "role": "admin" },
              { "user": { "id": "{{.team-create-guest-user.userid}}" }, "role": "guest" },
              { "user": { "id": "{{.team-create-maintainer-user.userid}}" }, "role": "content_maintainer" }
            ]
          }
        assertions:
          - result.statuscode ShouldEqual 200

  - name: team-maintainer-cannot-update-shared
    steps:
      - type: http
        method: PUT
        url: "{{.base_url}}/api/v1/teams/{{.team-lead-create-shared-a.shared_team_a_id}}"
        headers:
          Authorization: "Bearer {{.team-create-maintainer-session.sessionid}}"
          Content-Type: application/json
        body: |
          {
            "name": "Maintainer Hijack"
          }
        assertions:
          - result.statuscode ShouldEqual 403

  - name: team-lead-updates-shared
    steps:
      - type: http
        method: PUT
        url: "{{.base_url}}/api/v1/teams/{{.team-lead-create-shared-a.shared_team_a_id}}"
        headers:
          Authorization: "Bearer {{.team-create-lead-session.sessionid}}"
          Content-Type: application/json
        body: |
          {
            "name": "Updated Shared Title"
          }
        assertions:
          - result.statuscode ShouldEqual 200
          - result.bodyjson.name ShouldEqual "Updated Shared Title"

  - name: team-guest-put-forbidden-wrong-name-self-shaped
    steps:
      - type: http
        method: PUT
        url: "{{.base_url}}/api/v1/teams/{{.team-lead-create-shared-a.shared_team_a_id}}"
        headers:
          Authorization: "Bearer {{.team-create-guest-session.sessionid}}"
          Content-Type: application/json
        body: |
          {
            "name": "Wrong Title",
            "members": [
              { "user": { "id": "{{.team-create-lead-user.userid}}" }, "role": "admin" },
              { "user": { "id": "{{.team-create-maintainer-user.userid}}" }, "role": "content_maintainer" }
            ]
          }
        assertions:
          - result.statuscode ShouldEqual 403

  - name: team-guest-put-forbidden-bad-members-self-leave
    steps:
      - type: http
        method: PUT
        url: "{{.base_url}}/api/v1/teams/{{.team-lead-create-shared-a.shared_team_a_id}}"
        headers:
          Authorization: "Bearer {{.team-create-guest-session.sessionid}}"
          Content-Type: application/json
        body: |
          {
            "name": "Updated Shared Title",
            "members": [
              { "user": { "id": "{{.team-create-lead-user.userid}}" }, "role": "admin" }
            ]
          }
        assertions:
          - result.statuscode ShouldEqual 403

  - name: team-guest-leaves-via-put
    steps:
      - type: http
        method: PUT
        url: "{{.base_url}}/api/v1/teams/{{.team-lead-create-shared-a.shared_team_a_id}}"
        headers:
          Authorization: "Bearer {{.team-create-guest-session.sessionid}}"
          Content-Type: application/json
        body: |
          {
            "name": "Updated Shared Title",
            "members": [
              { "user": { "id": "{{.team-create-lead-user.userid}}" }, "role": "admin" },
              { "user": { "id": "{{.team-create-maintainer-user.userid}}" }, "role": "content_maintainer" }
            ]
          }
        assertions:
          - result.statuscode ShouldEqual 200

  - name: team-guest-get-after-self-leave-not-found
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/teams/{{.team-lead-create-shared-a.shared_team_a_id}}"
        headers:
          Authorization: "Bearer {{.team-create-guest-session.sessionid}}"
        assertions:
          - result.statuscode ShouldEqual 404

  - name: team-maintainer-leaves-via-put
    steps:
      - type: http
        method: PUT
        url: "{{.base_url}}/api/v1/teams/{{.team-lead-create-shared-a.shared_team_a_id}}"
        headers:
          Authorization: "Bearer {{.team-create-maintainer-session.sessionid}}"
          Content-Type: application/json
        body: |
          {
            "name": "Updated Shared Title",
            "members": [
              { "user": { "id": "{{.team-create-lead-user.userid}}" }, "role": "admin" }
            ]
          }
        assertions:
          - result.statuscode ShouldEqual 200

  - name: team-maintainer-get-after-self-leave-not-found
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/teams/{{.team-lead-create-shared-a.shared_team_a_id}}"
        headers:
          Authorization: "Bearer {{.team-create-maintainer-session.sessionid}}"
        assertions:
          - result.statuscode ShouldEqual 404

  - name: team-admin-updates-personal
    steps:
      - type: http
        method: PUT
        url: "{{.base_url}}/api/v1/teams/{{.team-admin-initial-list.admin_personal_team_id}}"
        headers:
          Authorization: "Bearer {{.token_admin}}"
          Content-Type: application/json
        body: |
          {
            "name": "Admin Personal Renamed"
          }
        assertions:
          - result.statuscode ShouldEqual 200
          - result.bodyjson.name ShouldEqual "Admin Personal Renamed"

  - name: team-catalog-user-create
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/users"
        headers:
          Authorization: "Bearer {{.token_admin}}"
          Content-Type: application/json
        body: |
          {
            "email": "team-catalog@test.com"
          }
        assertions:
          - result.statuscode ShouldEqual 201
        vars:
          userid:
            from: result.bodyjson.id

  - name: team-catalog-user-session
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/users/{{.team-catalog-user-create.userid}}/sessions"
        headers:
          Authorization: "Bearer {{.token_admin}}"
        assertions:
          - result.statuscode ShouldEqual 201
        vars:
          sessionid:
            from: result.bodyjson.id

  - name: team-catalog-read-songs-without-public-membership
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/songs"
        headers:
          Authorization: "Bearer {{.team-catalog-user-session.sessionid}}"
        assertions:
          - result.statuscode ShouldEqual 200

  - name: team-create-sole-leave-user
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/users"
        headers:
          Authorization: "Bearer {{.token_admin}}"
          Content-Type: application/json
        body: |
          {
            "email": "team-sole-leave@test.com"
          }
        assertions:
          - result.statuscode ShouldEqual 201
        vars:
          userid:
            from: result.bodyjson.id

  - name: team-create-sole-leave-session
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/users/{{.team-create-sole-leave-user.userid}}/sessions"
        headers:
          Authorization: "Bearer {{.token_admin}}"
        assertions:
          - result.statuscode ShouldEqual 201
        vars:
          sessionid:
            from: result.bodyjson.id

  - name: team-sole-create-shared
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/teams"
        headers:
          Authorization: "Bearer {{.team-create-sole-leave-session.sessionid}}"
          Content-Type: application/json
        body: |
          {
            "name": "Sole Admin Leave"
          }
        assertions:
          - result.statuscode ShouldEqual 201
        vars:
          sole_team_id:
            from: result.bodyjson.id

  - name: team-sole-cannot-leave
    steps:
      - type: http
        method: PUT
        url: "{{.base_url}}/api/v1/teams/{{.team-sole-create-shared.sole_team_id}}"
        headers:
          Authorization: "Bearer {{.team-create-sole-leave-session.sessionid}}"
          Content-Type: application/json
        body: |
          {
            "name": "Sole Admin Leave",
            "members": []
          }
        assertions:
          - result.statuscode ShouldEqual 409

  - name: team-create-second-admin-user
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/users"
        headers:
          Authorization: "Bearer {{.token_admin}}"
          Content-Type: application/json
        body: |
          {
            "email": "team-second-admin@test.com"
          }
        assertions:
          - result.statuscode ShouldEqual 201
        vars:
          userid:
            from: result.bodyjson.id

  - name: team-create-second-admin-session
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/users/{{.team-create-second-admin-user.userid}}/sessions"
        headers:
          Authorization: "Bearer {{.token_admin}}"
        assertions:
          - result.statuscode ShouldEqual 201
        vars:
          sessionid:
            from: result.bodyjson.id

  - name: team-sole-add-second-admin
    steps:
      - type: http
        method: PUT
        url: "{{.base_url}}/api/v1/teams/{{.team-sole-create-shared.sole_team_id}}"
        headers:
          Authorization: "Bearer {{.team-create-sole-leave-session.sessionid}}"
          Content-Type: application/json
        body: |
          {
            "name": "Sole Admin Leave",
            "members": [
              { "user": { "id": "{{.team-create-sole-leave-user.userid}}" }, "role": "admin" },
              { "user": { "id": "{{.team-create-second-admin-user.userid}}" }, "role": "admin" }
            ]
          }
        assertions:
          - result.statuscode ShouldEqual 200

  - name: team-first-admin-can-leave
    steps:
      - type: http
        method: PUT
        url: "{{.base_url}}/api/v1/teams/{{.team-sole-create-shared.sole_team_id}}"
        headers:
          Authorization: "Bearer {{.team-create-sole-leave-session.sessionid}}"
          Content-Type: application/json
        body: |
          {
            "name": "Sole Admin Leave",
            "members": [
              { "user": { "id": "{{.team-create-second-admin-user.userid}}" }, "role": "admin" }
            ]
          }
        assertions:
          - result.statuscode ShouldEqual 200

  - name: team-guest-cannot-delete-shared
    steps:
      - type: http
        method: DELETE
        url: "{{.base_url}}/api/v1/teams/{{.team-lead-create-shared-b-same-name.shared_team_b_id}}"
        headers:
          Authorization: "Bearer {{.team-create-guest-session.sessionid}}"
        assertions:
          - result.statuscode ShouldEqual 403

  - name: team-lead-delete-shared-b
    steps:
      - type: http
        method: DELETE
        url: "{{.base_url}}/api/v1/teams/{{.team-lead-create-shared-b-same-name.shared_team_b_id}}"
        headers:
          Authorization: "Bearer {{.team-create-lead-session.sessionid}}"
        assertions:
          - result.statuscode ShouldEqual 200

  - name: team-lead-get-deleted-shared-not-found
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/teams/{{.team-lead-create-shared-b-same-name.shared_team_b_id}}"
        headers:
          Authorization: "Bearer {{.team-create-lead-session.sessionid}}"
        assertions:
          - result.statuscode ShouldEqual 404

  - name: team-delete-public-not-exposed
    steps:
      - type: http
        method: DELETE
        url: "{{.base_url}}/api/v1/teams/public"
        headers:
          Authorization: "Bearer {{.token_admin}}"
        assertions:
          - result.statuscode ShouldEqual 404
