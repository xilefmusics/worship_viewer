          {
            "file_type": "image/png",
            "width": 640,
            "height": 480,
            "ocr": "Blob for write permission"
          }
        assertions:
          - result.statuscode ShouldEqual 201
        vars:
          blobid:
            from: result.bodyjson.id

  # BLC: BLC-BLOB-005
  - name: post-blob-invalid-payload-missing-width
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/blobs"
