name: Blobs endpoints
vars:
  base_url: http://127.0.0.1:8080
  token_admin: admin

testcases:
  # Setup: Users and sessions
  # BLC: BLC-USER-003
  - name: create-blob-owner-user
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/users"
        headers:
          Authorization: "Bearer {{.token_admin}}"
          Content-Type: application/json
        body: |
          {
            "email": "blobowner@test.com"
          }
        assertions:
          - result.statuscode ShouldEqual 201
          - result.bodyjson.email ShouldEqual "blobowner@test.com"
        vars:
          userid:
            from: result.bodyjson.id

  # BLC: BLC-USER-011
  - name: create-blob-owner-session
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/users/{{.create-blob-owner-user.userid}}/sessions"
        headers:
          Authorization: "Bearer {{.token_admin}}"
        assertions:
          - result.statuscode ShouldEqual 201
        vars:
          sessionid:
            from: result.bodyjson.id

  # BLC: BLC-TEAM-001
  - name: get-blob-owner-personal-team
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/teams"
        headers:
          Authorization: "Bearer {{.create-blob-owner-session.sessionid}}"
        assertions:
          - result.statuscode ShouldEqual 200
          - result.bodyjson ShouldHaveLength 1
        vars:
          owner_personal_team_id:
            from: result.bodyjson.bodyjson0.id

  # BLC: BLC-USER-003
  - name: create-blob-read-user
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/users"
        headers:
          Authorization: "Bearer {{.token_admin}}"
          Content-Type: application/json
        body: |
          {
            "email": "blobread@test.com"
          }
        assertions:
          - result.statuscode ShouldEqual 201
          - result.bodyjson.email ShouldEqual "blobread@test.com"
        vars:
          userid:
            from: result.bodyjson.id

  # BLC: BLC-USER-011
  - name: create-blob-read-session
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/users/{{.create-blob-read-user.userid}}/sessions"
        headers:
          Authorization: "Bearer {{.token_admin}}"
        assertions:
          - result.statuscode ShouldEqual 201
        vars:
          sessionid:
            from: result.bodyjson.id

  # BLC: BLC-USER-003
  - name: create-blob-write-user
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/users"
        headers:
          Authorization: "Bearer {{.token_admin}}"
          Content-Type: application/json
        body: |
          {
            "email": "blobwrite@test.com"
          }
        assertions:
          - result.statuscode ShouldEqual 201
          - result.bodyjson.email ShouldEqual "blobwrite@test.com"
        vars:
          userid:
            from: result.bodyjson.id

  # BLC: BLC-USER-011
  - name: create-blob-write-session
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/users/{{.create-blob-write-user.userid}}/sessions"
        headers:
          Authorization: "Bearer {{.token_admin}}"
        assertions:
          - result.statuscode ShouldEqual 201
        vars:
          sessionid:
            from: result.bodyjson.id

  # BLC: BLC-USER-003
  - name: create-blob-noperm-user
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/users"
        headers:
          Authorization: "Bearer {{.token_admin}}"
          Content-Type: application/json
        body: |
          {
            "email": "blobnoperm@test.com"
          }
        assertions:
          - result.statuscode ShouldEqual 201
          - result.bodyjson.email ShouldEqual "blobnoperm@test.com"
        vars:
          userid:
            from: result.bodyjson.id

  # BLC: BLC-USER-011
  - name: create-blob-noperm-session
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/users/{{.create-blob-noperm-user.userid}}/sessions"
        headers:
          Authorization: "Bearer {{.token_admin}}"
        assertions:
          - result.statuscode ShouldEqual 201
        vars:
          sessionid:
            from: result.bodyjson.id

  # BLC: BLC-TEAM-011, BLC-BLOB-002
  - name: configure-blob-owner-team-acl
    steps:
      - type: http
        method: PUT
        url: "{{.base_url}}/api/v1/teams/{{.get-blob-owner-personal-team.owner_personal_team_id}}"
        headers:
          Authorization: "Bearer {{.create-blob-owner-session.sessionid}}"
          Content-Type: application/json
        body: |
          {
            "name": "Personal",
            "members": [
              { "user": { "id": "{{.create-blob-read-user.userid}}" }, "role": "guest" },
              { "user": { "id": "{{.create-blob-write-user.userid}}" }, "role": "content_maintainer" }
            ]
          }
        assertions:
          - result.statuscode ShouldEqual 200

  # POST /api/v1/blobs tests
  # BLC: BLC-BLOB-009, BLC-BLOB-005
  - name: post-blob-success
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/blobs"
        headers:
          Authorization: "Bearer {{.create-blob-owner-session.sessionid}}"
          Content-Type: application/json
        body: |
          {
            "file_type": "image/png",
            "width": 1920,
            "height": 1080,
            "ocr": "Owner blob"
          }
        assertions:
          - result.statuscode ShouldEqual 201
          - result.bodyjson.owner ShouldEqual "{{.get-blob-owner-personal-team.owner_personal_team_id}}"
          - result.bodyjson.file_type ShouldEqual "image/png"
        vars:
          blobid:
            from: result.bodyjson.id

