          Content-Type: application/json
        body: |
          {
            "file_type": "image/png",
            "width": 100,
            "ocr": "No height"
          }
        assertions:
          - result.statuscode ShouldEqual 400

  # BLC: BLC-BLOB-005
  - name: post-blob-invalid-payload-missing-ocr
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/blobs"
        headers:
          Authorization: "Bearer {{.create-blob-owner-session.sessionid}}"
